<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben's Games - Community Forum</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#1a1a2e',
                        brandNav: '#0f4c75',
                        brandCard: '#2c394b',
                        brandInner: '#1a233b',
                        brandPink: '#ff99c8',
                        brandYellow: '#ffe082',
                        brandOrange: '#ff5733',
                        brandOrangeHover: '#c70039',
                        brandBlue: '#33a2ff',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #2c394b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #33a2ff; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col selection:bg-brandPink selection:text-brandDark">

    <!-- Header Section -->
    <header class="container mx-auto px-4 mt-6 max-w-4xl">
        <div class="bg-brandNav p-6 rounded-2xl shadow-2xl border border-blue-900/30 text-center relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-brandPink/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-brandBlue/10 rounded-full blur-3xl"></div>
            <div class="relative z-10">
                <h1 class="text-3xl md:text-4xl font-extrabold text-brandPink tracking-tight drop-shadow-md mb-2">
                    💬 Community Forum
                </h1>
                <p class="text-gray-300 text-sm md:text-base">
                    Chat about games, share high scores, or ask for help!
                </p>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto px-4 py-8 max-w-4xl flex-grow flex flex-col">
        
        <!-- Auth/Loading Overlay -->
        <div id="loading-view" class="flex-grow flex flex-col items-center justify-center py-16">
            <div class="w-12 h-12 border-4 border-brandBlue border-t-brandPink rounded-full animate-spin mb-4"></div>
            <p class="text-brandBlue font-semibold animate-pulse">Connecting to Forum...</p>
        </div>

        <!-- App Container (Hidden until loaded) -->
        <div id="app-container" class="hidden flex-col gap-6">

            <!-- Global User Settings (Top Bar) -->
            <div class="bg-brandCard p-4 rounded-xl shadow-lg border border-gray-700/50 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-xl">👤</span>
                    <span class="text-gray-300 text-sm">Posting as:</span>
                    <input type="text" id="global-username" placeholder="Anonymous" class="bg-brandInner border border-gray-600 rounded px-3 py-1 text-sm focus:outline-none focus:border-brandBlue text-brandYellow font-semibold max-w-[150px]">
                </div>
                
                <!-- Back Button (Only visible in thread view) -->
                <button id="btn-back-to-list" class="hidden text-sm bg-brandInner hover:bg-gray-700 text-gray-300 border border-gray-600 px-4 py-2 rounded-lg transition-colors flex items-center gap-2">
                    <span>←</span> Back to All Threads
                </button>

                <!-- New Thread Button (Only visible in list view) -->
                <button id="btn-new-thread" class="text-sm bg-brandBlue hover:bg-blue-500 text-brandDark font-bold px-4 py-2 rounded-lg transition-colors shadow-lg hover:shadow-brandBlue/30">
                    + Create New Thread
                </button>
            </div>

            <!-- View 1: Thread List -->
            <div id="view-thread-list" class="flex flex-col gap-4 fade-in">
                <div id="threads-container" class="flex flex-col gap-3">
                    <!-- Threads populated by JS -->
                </div>
                <div id="no-threads-msg" class="hidden text-center py-12 bg-brandInner rounded-xl border border-dashed border-gray-700">
                    <p class="text-brandPink text-lg font-semibold">No threads yet! Be the first to post. 🚀</p>
                </div>
            </div>

            <!-- View 2: Single Thread View -->
            <div id="view-single-thread" class="hidden flex-col gap-4 fade-in">
                <!-- Original Post -->
                <div class="bg-brandCard rounded-xl shadow-lg border border-brandBlue/30 overflow-hidden">
                    <div class="bg-[#1e2738] p-4 border-b border-gray-700/50 flex justify-between items-start">
                        <div>
                            <h2 id="st-title" class="text-2xl font-bold text-brandYellow mb-1">Loading...</h2>
                            <p class="text-xs text-gray-400">
                                Posted by <span id="st-author" class="font-bold text-brandPink">...</span> on <span id="st-date">...</span>
                            </p>
                        </div>
                    </div>
                    <div class="p-6 text-gray-200 whitespace-pre-wrap leading-relaxed" id="st-content">
                        ...
                    </div>
                </div>

                <h3 class="text-lg font-bold text-gray-300 ml-2 mt-4">Replies (<span id="st-reply-count">0</span>)</h3>

                <!-- Replies Container -->
                <div id="replies-container" class="flex flex-col gap-3">
                    <!-- Replies populated by JS -->
                </div>

                <!-- Add Reply Form -->
                <div class="bg-brandInner p-5 rounded-xl border border-gray-700 mt-2">
                    <h4 class="font-semibold text-brandBlue mb-3">Add a Reply</h4>
                    <textarea id="reply-content" rows="3" placeholder="Type your reply here..." class="w-full bg-brandCard border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-brandPink resize-none mb-3"></textarea>
                    <div class="flex justify-between items-center">
                        <span id="reply-error" class="text-red-400 text-sm font-semibold"></span>
                        <button id="btn-submit-reply" class="bg-brandOrange hover:bg-brandOrangeHover text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md">
                            Post Reply
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Create Thread Modal -->
    <div id="modal-create-thread" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-brandCard w-full max-w-lg rounded-2xl border border-gray-700 shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="bg-brandNav p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 class="font-bold text-lg text-brandYellow">Create a New Thread</h3>
                <button id="btn-close-modal" class="text-gray-400 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div class="p-6 flex flex-col gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Thread Title</label>
                    <input type="text" id="new-thread-title" placeholder="E.g., I beat the high score!" class="w-full bg-brandInner border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-brandBlue">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Message</label>
                    <textarea id="new-thread-content" rows="5" placeholder="Share your thoughts..." class="w-full bg-brandInner border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-brandBlue resize-none"></textarea>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span id="new-thread-error" class="text-red-400 text-sm font-semibold"></span>
                    <button id="btn-submit-thread" class="bg-brandPink hover:bg-pink-400 text-brandDark font-bold py-2 px-6 rounded-lg transition-colors shadow-md">
                        Post Thread
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // Environment Variables configuration (Uses active sandbox config OR falls back to your real database config when self-hosted!)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDyMbSVjBTVStyRXOEo38IeMcM4LWTdJ-I",
            authDomain: "games-d836d.firebaseapp.com", 
            databaseURL: "https://games-d836d-default-rtdb.firebaseio.com",
            projectId: "games-d836d",
            storageBucket: "games-d836d.firebasestorage.app",
            messagingSenderId: "228157907811",
            appId: "1:228157907811:web:c2a536b3b3bb6ade5e6956"
        };
        
        // Get primary appId and make sure it is safe for Firebase Realtime Database paths by replacing "." and other invalid characters
        const rawAppId = typeof __app_id !== 'undefined' ? __app_id : 'games-d836d';
        const appId = rawAppId.replace(/[.#$[\]]/g, '_'); 
        
        const COLLECTION_NAME = 'forum_threads';

        // State Variables
        let db;
        let currentUser = null;
        let allThreads = [];
        let currentViewedThreadId = null;

        // DOM Elements
        const loadingView = document.getElementById('loading-view');
        const appContainer = document.getElementById('app-container');
        const globalUsernameInput = document.getElementById('global-username');
        
        // Views
        const viewThreadList = document.getElementById('view-thread-list');
        const viewSingleThread = document.getElementById('view-single-thread');
        
        // List Elements
        const threadsContainer = document.getElementById('threads-container');
        const noThreadsMsg = document.getElementById('no-threads-msg');
        const btnNewThread = document.getElementById('btn-new-thread');
        const btnBackToList = document.getElementById('btn-back-to-list');
        
        // Single Thread Elements
        const stTitle = document.getElementById('st-title');
        const stAuthor = document.getElementById('st-author');
        const stDate = document.getElementById('st-date');
        const stContent = document.getElementById('st-content');
        const stReplyCount = document.getElementById('st-reply-count');
        const repliesContainer = document.getElementById('replies-container');
        const replyContentInput = document.getElementById('reply-content');
        const btnSubmitReply = document.getElementById('btn-submit-reply');
        const replyError = document.getElementById('reply-error');

        // Modal Elements
        const modalCreateThread = document.getElementById('modal-create-thread');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const newThreadTitle = document.getElementById('new-thread-title');
        const newThreadContent = document.getElementById('new-thread-content');
        const btnSubmitThread = document.getElementById('btn-submit-thread');
        const newThreadError = document.getElementById('new-thread-error');

        // Initialize App
        const init = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getDatabase(app);

                // Authenticate
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // Listen to auth state
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        loadSavedUsername();
                        setupDatabaseListener();
                        
                        // Hide loading, show app
                        loadingView.classList.add('hidden');
                        appContainer.classList.remove('hidden');
                        appContainer.classList.add('flex');
                    }
                });
            } catch (err) {
                console.error("Firebase init failed:", err);
                loadingView.innerHTML = `<p class="text-red-500 font-bold text-lg px-4">Error connecting to database. Please make sure your server allows connections to Firebase!</p>`;
            }
        };

        // Name Management
        const getUsername = () => {
            const name = globalUsernameInput.value.trim();
            return name ? name : 'Anonymous';
        };

        const loadSavedUsername = () => {
            const saved = localStorage.getItem('forumUsername');
            if (saved) globalUsernameInput.value = saved;
        };

        globalUsernameInput.addEventListener('change', () => {
            localStorage.setItem('forumUsername', globalUsernameInput.value.trim());
        });

        // Time Formatter
        const timeAgo = (timestamp) => {
            if (!timestamp) return 'Just now';
            const seconds = Math.floor((new Date() - new Date(timestamp)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m ago";
            return "Just now";
        };

        const formatDate = (timestamp) => {
            if (!timestamp) return 'Unknown Date';
            return new Date(timestamp).toLocaleDateString('en-US', { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });
        };

        // Database Listener (Uses Realtime Database)
        const setupDatabaseListener = () => {
            if (!currentUser) return;

            const threadsRef = ref(db, `artifacts/${appId}/public/data/${COLLECTION_NAME}`);
            
            onValue(threadsRef, (snapshot) => {
                const data = snapshot.val();
                const tempThreads = [];
                
                if (data) {
                    for (let id in data) {
                        const threadData = data[id];
                        
                        // Convert replies map to array
                        const repliesArray = [];
                        if (threadData.replies) {
                            for (let replyId in threadData.replies) {
                                repliesArray.push({
                                    id: replyId,
                                    ...threadData.replies[replyId]
                                });
                            }
                            // Sort replies by creation date ascending
                            repliesArray.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                        }
                        
                        tempThreads.push({
                            id: id,
                            ...threadData,
                            replies: repliesArray
                        });
                    }
                }

                // Sort threads descending (newest first)
                tempThreads.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                allThreads = tempThreads;

                // Update UI based on current view
                if (currentViewedThreadId) {
                    renderSingleThread(currentViewedThreadId);
                } else {
                    renderThreadList();
                }
            }, (error) => {
                console.error("Error fetching threads:", error);
                loadingView.innerHTML = `<p class="text-red-500 font-bold text-lg px-4">Permission Error: Make sure your database allows public access!</p>`;
            });
        };

        // UI Rendering - List View
        const renderThreadList = () => {
            threadsContainer.innerHTML = '';
            
            if (allThreads.length === 0) {
                noThreadsMsg.classList.remove('hidden');
            } else {
                noThreadsMsg.classList.add('hidden');
                
                allThreads.forEach(thread => {
                    const repliesCount = thread.replies ? thread.replies.length : 0;
                    
                    const card = document.createElement('div');
                    card.className = "bg-brandCard p-4 rounded-xl border border-gray-700 hover:border-brandBlue cursor-pointer transition-all hover:bg-[#34445c] shadow-sm";
                    card.onclick = () => openThread(thread.id);
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start gap-4">
                            <div class="flex-grow">
                                <h3 class="text-lg font-bold text-brandBlue mb-1">${escapeHTML(thread.title)}</h3>
                                <p class="text-sm text-gray-400">By <span class="text-brandPink font-semibold">${escapeHTML(thread.author)}</span> • ${timeAgo(thread.createdAt)}</p>
                            </div>
                            <div class="bg-brandInner border border-gray-600 px-3 py-1 rounded-lg flex flex-col items-center min-w-[60px]">
                                <span class="font-bold text-white leading-none">${repliesCount}</span>
                                <span class="text-[10px] text-gray-400 uppercase">Replies</span>
                            </div>
                        </div>
                    `;
                    threadsContainer.appendChild(card);
                });
            }
        };

        // UI Rendering - Single Thread View
        const renderSingleThread = (threadId) => {
            const thread = allThreads.find(t => t.id === threadId);
            if (!thread) {
                closeThread(); // Thread deleted or not found
                return;
            }

            stTitle.textContent = thread.title;
            stAuthor.textContent = thread.author;
            stDate.textContent = formatDate(thread.createdAt);
            stContent.textContent = thread.content; 
            
            const replies = thread.replies || [];
            stReplyCount.textContent = replies.length;
            
            repliesContainer.innerHTML = '';
            if (replies.length === 0) {
                repliesContainer.innerHTML = '<p class="text-sm text-gray-500 italic py-2">No replies yet. Be the first to answer!</p>';
            } else {
                replies.forEach(reply => {
                    const rDiv = document.createElement('div');
                    rDiv.className = "bg-brandInner p-4 rounded-lg border border-gray-700/50";
                    rDiv.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-sm text-brandYellow">${escapeHTML(reply.author)}</span>
                            <span class="text-xs text-gray-500">${timeAgo(reply.createdAt)}</span>
                        </div>
                        <p class="text-sm text-gray-300 whitespace-pre-wrap">${escapeHTML(reply.content)}</p>
                    `;
                    repliesContainer.appendChild(rDiv);
                });
            }
        };

        // Navigation Actions
        const openThread = (threadId) => {
            currentViewedThreadId = threadId;
            renderSingleThread(threadId);
            
            viewThreadList.classList.add('hidden');
            btnNewThread.classList.add('hidden');
            
            viewSingleThread.classList.remove('hidden');
            viewSingleThread.classList.add('flex');
            btnBackToList.classList.remove('hidden');
            btnBackToList.classList.add('flex');
        };

        const closeThread = () => {
            currentViewedThreadId = null;
            
            viewSingleThread.classList.add('hidden');
            viewSingleThread.classList.remove('flex');
            btnBackToList.classList.add('hidden');
            btnBackToList.classList.remove('flex');
            
            viewThreadList.classList.remove('hidden');
            btnNewThread.classList.remove('hidden');
            
            renderThreadList();
        };

        btnBackToList.onclick = closeThread;

        // Modal Actions
        const openModal = () => {
            newThreadTitle.value = '';
            newThreadContent.value = '';
            newThreadError.textContent = '';
            
            modalCreateThread.classList.remove('hidden');
            setTimeout(() => {
                modalCreateThread.classList.remove('opacity-0');
                modalCreateThread.children[0].classList.remove('scale-95');
                modalCreateThread.children[0].classList.add('scale-100');
            }, 10);
        };

        const closeModal = () => {
            modalCreateThread.classList.add('opacity-0');
            modalCreateThread.children[0].classList.remove('scale-100');
            modalCreateThread.children[0].classList.add('scale-95');
            setTimeout(() => {
                modalCreateThread.classList.add('hidden');
            }, 300);
        };

        btnNewThread.onclick = openModal;
        btnCloseModal.onclick = closeModal;

        // Create Thread Action
        btnSubmitThread.onclick = async () => {
            const title = newThreadTitle.value.trim();
            const content = newThreadContent.value.trim();
            
            if (!title || !content) {
                newThreadError.textContent = "Please fill out both fields.";
                return;
            }
            if (!currentUser) return;

            btnSubmitThread.disabled = true;
            btnSubmitThread.textContent = "Posting...";

            try {
                const threadsRef = ref(db, `artifacts/${appId}/public/data/${COLLECTION_NAME}`);
                const newThreadRef = push(threadsRef);
                await set(newThreadRef, {
                    title: title,
                    content: content,
                    author: getUsername(),
                    createdAt: Date.now(),
                    replies: {}
                });
                closeModal();
            } catch (err) {
                console.error("Error creating thread:", err);
                newThreadError.textContent = "Error saving thread.";
            } finally {
                btnSubmitThread.disabled = false;
                btnSubmitThread.textContent = "Post Thread";
            }
        };

        // Add Reply Action
        btnSubmitReply.onclick = async () => {
            const content = replyContentInput.value.trim();
            if (!content) {
                replyError.textContent = "Reply cannot be empty.";
                return;
            }
            if (!currentUser || !currentViewedThreadId) return;

            btnSubmitReply.disabled = true;
            btnSubmitReply.textContent = "Sending...";
            replyError.textContent = "";

            try {
                const repliesRef = ref(db, `artifacts/${appId}/public/data/${COLLECTION_NAME}/${currentViewedThreadId}/replies`);
                const newReplyRef = push(repliesRef);
                
                await set(newReplyRef, {
                    author: getUsername(),
                    content: content,
                    createdAt: Date.now()
                });

                replyContentInput.value = '';
            } catch (err) {
                console.error("Error posting reply:", err);
                replyError.textContent = "Failed to post reply.";
            } finally {
                btnSubmitReply.disabled = false;
                btnSubmitReply.textContent = "Post Reply";
            }
        };

        // Utility Function to escape HTML to prevent safety vulnerabilities
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        };

        // Start application
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
