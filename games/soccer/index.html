<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Goalkeeper Challenge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .stats-panel { pointer-events: auto; }
        .stats { font-size: 24px; font-weight: bold; }
        #msg-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            width: 100%;
        }
        .msg {
            font-size: 64px;
            font-weight: 900;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }
        .btn {
            background: #22c55e;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            cursor: pointer;
            pointer-events: auto;
            border: none;
            font-size: 24px;
            margin-top: 10px;
            box-shadow: 0 4px 14px 0 rgba(0,118,255,0.39);
        }
        .btn:hover { background: #16a34a; transform: scale(1.05); }
        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px;
            transition: background 0.2s;
        }
        .control-btn:hover { background: rgba(255, 255, 255, 0.4); }
        
        #leaderboard {
            position: absolute;
            left: 20px;
            top: 150px;
            width: 200px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            padding: 15px;
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .leaderboard-title { font-size: 18px; font-weight: bold; border-bottom: 1px solid white; margin-bottom: 10px; padding-bottom: 5px; color: #fbbf24; }
        .leaderboard-entry { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
        .current-user { color: #4ade80; font-weight: bold; }

        .miss-count { color: #f87171; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="flex justify-between items-start">
        <div class="flex flex-col gap-2 stats-panel">
            <div class="stats bg-black/30 p-2 rounded">Saves: <span id="saves">0</span></div>
            <div class="stats bg-black/30 p-2 rounded miss-count">Missed: <span id="missed">0</span>/20</div>
        </div>

        <div class="flex flex-col">
            <button class="control-btn" id="zoomInBtn" title="Zoom In">+</button>
            <button class="control-btn" id="zoomOutBtn" title="Zoom Out">-</button>
        </div>
    </div>

    <div id="leaderboard">
        <div class="leaderboard-title">Top Keepers</div>
        <div id="leaderboard-list">
            <div class="text-xs italic" id="leaderboard-status">Offline Mode</div>
        </div>
    </div>
    
    <div id="msg-container">
        <div id="status-text" class="msg text-yellow-400">READY?</div>
        <button id="start-btn" class="btn">PLAY KEEPER</button>
    </div>

    <div class="text-center opacity-70 text-sm bg-black/20 p-1">Move mouse or drag to save the ball!</div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, limit } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- BROWSER COMPATIBILITY FIX ---
    let firebaseConfig = null;
    let appId = 'keeper-game';
    let storageEnabled = false;

    try {
        // Attempt to load from the environment
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'keeper-game';
            storageEnabled = true;
        }
    } catch (e) {
        console.warn("Firebase config not found. Running in Offline Mode.");
    }

    let auth, db;
    if (storageEnabled && firebaseConfig) {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
    }

    let currentUser = null;
    let scene, camera, renderer, ball, pitch, gloves = [];
    let ballVelocity = new THREE.Vector3();
    let isBallActive = false;
    let saves = 0;
    let missed = 0;
    let bestScore = 0;
    let mouse = new THREE.Vector2();
    let gameActive = false;
    let initialized = false;
    const MAX_MISSES = 20;

    const BALL_RADIUS = 0.25;
    const GOAL_WIDTH = 10; 
    const GOAL_HEIGHT = 4; 
    const PITCH_WIDTH = 60;
    const PITCH_LENGTH = 100;

    const initAuth = async () => {
        if (!storageEnabled) return;
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (err) {
            console.error("Auth failed:", err);
            storageEnabled = false;
        }
    };

    if (storageEnabled) {
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('leaderboard-status').innerText = "Loading scores...";
                setupLeaderboardListener();
                loadBestScore();
            }
        });
    }

    const setupLeaderboardListener = () => {
        if (!storageEnabled || !currentUser) return;
        const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
        onSnapshot(leaderboardRef, (snapshot) => {
            const scores = [];
            snapshot.forEach(doc => scores.push(doc.data()));
            scores.sort((a, b) => b.score - a.score);
            updateLeaderboardUI(scores.slice(0, 10));
        }, (error) => console.error("Leaderboard Error:", error));
    };

    const updateLeaderboardUI = (topScores) => {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        topScores.forEach((entry, index) => {
            const item = document.createElement('div');
            item.className = `leaderboard-entry ${currentUser && entry.userId === currentUser.uid ? 'current-user' : ''}`;
            item.innerHTML = `<span>${index + 1}. ${entry.userId.substring(0, 6)}</span> <span>${entry.score}</span>`;
            list.appendChild(item);
        });
    };

    const loadBestScore = async () => {
        if (!storageEnabled || !currentUser) return;
        const userDoc = await getDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'stats'));
        if (userDoc.exists()) {
            bestScore = userDoc.data().bestScore || 0;
        }
    };

    const saveScore = async () => {
        if (!storageEnabled || !currentUser || saves <= bestScore) return;
        bestScore = saves;
        const scoreData = { userId: currentUser.uid, score: bestScore, timestamp: Date.now() };
        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'stats'), { bestScore });
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', currentUser.uid), scoreData);
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.5, 4); 
        camera.lookAt(0, 1.5, -50);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        const pitchGeo = new THREE.PlaneGeometry(PITCH_WIDTH, PITCH_LENGTH);
        const pitchMat = new THREE.MeshStandardMaterial({ color: 0x348C31 });
        pitch = new THREE.Mesh(pitchGeo, pitchMat);
        pitch.rotation.x = -Math.PI / 2;
        pitch.receiveShadow = true;
        scene.add(pitch);

        const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const postRadius = 0.1;
        const leftPost = new THREE.Mesh(new THREE.CylinderGeometry(postRadius, postRadius, GOAL_HEIGHT), postMat);
        leftPost.position.set(-GOAL_WIDTH/2, GOAL_HEIGHT/2, 0);
        scene.add(leftPost);

        const rightPost = new THREE.Mesh(new THREE.CylinderGeometry(postRadius, postRadius, GOAL_HEIGHT), postMat);
        rightPost.position.set(GOAL_WIDTH/2, GOAL_HEIGHT/2, 0);
        scene.add(rightPost);

        const bar = new THREE.Mesh(new THREE.CylinderGeometry(postRadius, postRadius, GOAL_WIDTH), postMat);
        bar.rotation.z = Math.PI / 2;
        bar.position.set(0, GOAL_HEIGHT, 0);
        scene.add(bar);

        const netGeo = new THREE.BoxGeometry(GOAL_WIDTH, GOAL_HEIGHT, 2);
        const netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.15 });
        const net = new THREE.Mesh(netGeo, netMat);
        net.position.set(0, GOAL_HEIGHT/2, 1);
        scene.add(net);

        ball = new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        ball.castShadow = true;
        scene.add(ball);

        const gloveGeo = new THREE.BoxGeometry(0.6, 0.8, 0.2);
        const gloveMat = new THREE.MeshStandardMaterial({ color: 0xe11d48 }); 
        for(let i=0; i<2; i++) {
            const glove = new THREE.Mesh(gloveGeo, gloveMat);
            glove.position.set(i === 0 ? -0.8 : 0.8, 1.5, 0.5);
            scene.add(glove);
            gloves.push(glove);
        }

        resetBall();
        initialized = true;
        animate();
    }

    function resetBall() {
        if (!ball) return;
        isBallActive = false;
        ball.position.set(0, BALL_RADIUS, -40); 
        ballVelocity.set(0, 0, 0);
    }

    function shoot() {
        if (!gameActive || !ball) return;
        if (missed >= MAX_MISSES) { gameOver(); return; }
        resetBall();
        isBallActive = true;
        const targetX = (Math.random() - 0.5) * (GOAL_WIDTH * 1.5);
        const targetY = Math.random() * (GOAL_HEIGHT * 1.2);
        const targetZ = 0.5;
        const direction = new THREE.Vector3(targetX, targetY, targetZ).sub(ball.position);
        const time = 0.8 + Math.random() * 0.4; 
        ballVelocity.copy(direction).divideScalar(60 * time);
        showStatus("");
    }

    function showStatus(txt) {
        const el = document.getElementById('status-text');
        if (el) { el.innerText = txt; el.style.opacity = txt ? "1" : "0"; }
    }

    function startGame() {
        gameActive = true;
        saves = 0;
        missed = 0;
        updateUI();
        document.getElementById('start-btn').style.display = 'none';
        setTimeout(shoot, 1000);
    }

    function gameOver() {
        gameActive = false;
        isBallActive = false;
        saveScore();
        showStatus("GAME OVER!");
        const startBtn = document.getElementById('start-btn');
        startBtn.innerText = "RETRY";
        startBtn.style.display = 'inline-block';
    }

    function updateUI() {
        document.getElementById('saves').innerText = saves;
        document.getElementById('missed').innerText = missed;
    }

    function handleInput(x, y) {
        if (!initialized || gloves.length < 2 || !gameActive) return;
        mouse.x = (x / window.innerWidth) * 2 - 1;
        mouse.y = -(y / window.innerHeight) * 2 + 1;
        const moveX = mouse.x * (GOAL_WIDTH * 0.6);
        const moveY = Math.max(0.5, (mouse.y + 0.8) * (GOAL_HEIGHT * 0.8));
        gloves[0].position.set(moveX - 0.5, moveY, 0.5);
        gloves[1].position.set(moveX + 0.5, moveY, 0.5);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isBallActive && ball && gameActive) {
            ball.position.add(ballVelocity);
            ball.rotation.x += 0.2;
            ball.rotation.y += 0.2;
            
            gloves.forEach(glove => {
                const dist = ball.position.distanceTo(glove.position);
                if (dist < 0.85) {
                    saves++;
                    updateUI();
                    isBallActive = false;
                    showStatus("GREAT SAVE!");
                    saveScore();
                    setTimeout(shoot, 1500);
                    ballVelocity.z *= -0.5;
                    ballVelocity.y += 0.2;
                }
            });

            if (ball.position.z > 0.5) {
                const inGoalX = Math.abs(ball.position.x) < GOAL_WIDTH / 2;
                const inGoalY = ball.position.y < GOAL_HEIGHT && ball.position.y > 0;

                if (inGoalX && inGoalY) {
                    missed++;
                    showStatus("GOAL!");
                } else {
                    saves++;
                    showStatus("WIDE!");
                    saveScore();
                }
                updateUI();
                isBallActive = false;
                
                if (missed >= MAX_MISSES) {
                    gameOver();
                } else {
                    setTimeout(shoot, 1500);
                }
            }
        }
        if (renderer) renderer.render(scene, camera);
    }

    window.onload = () => { 
        initAuth(); 
        init(); 
    };
    window.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
        if (e.touches[0]) handleInput(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
    }, { passive: false });
    window.addEventListener('resize', () => {
        if (camera && renderer) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });

    document.getElementById('zoomInBtn').onclick = () => { camera.fov = Math.max(20, camera.fov - 5); camera.updateProjectionMatrix(); };
    document.getElementById('zoomOutBtn').onclick = () => { camera.fov = Math.min(100, camera.fov + 5); camera.updateProjectionMatrix(); };
    document.getElementById('start-btn').onclick = startGame;
</script>
</body>
</html>
