<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Championship Tic Tac Toe</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .grid-cell {
            aspect-ratio: 1 / 1;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow-x {
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            color: #c084fc;
        }

        .glow-o {
            text-shadow: 0 0 15px rgba(45, 212, 191, 0.6);
            color: #2dd4bf;
        }

        .cell-x-active {
            box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.25);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .cell-o-active {
            box-shadow: inset 0 0 20px rgba(45, 212, 191, 0.25);
            border-color: rgba(45, 212, 191, 0.4);
        }

        /* Confetti Canvas */
        #confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-100 p-4 relative">
    <canvas id="confetti"></canvas>

    <div class="w-full max-w-md flex flex-col gap-6 z-10">
        <!-- Header -->
        <header class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-purple-400 via-pink-400 to-teal-400 bg-clip-text text-transparent">
                NEON GRID
            </h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Tic Tac Toe Championship</p>
        </header>

        <!-- Mode Selectors & Controls -->
        <div class="glass-panel rounded-2xl p-4 flex flex-col gap-3">
            <div class="flex justify-between items-center text-sm font-medium">
                <span class="text-slate-300">Game Mode:</span>
                <div class="flex gap-1 bg-slate-900/50 p-1 rounded-lg border border-slate-700/50">
                    <button id="btn-pvp" class="px-3 py-1.5 rounded-md transition-all text-xs font-semibold bg-purple-600 text-white shadow">
                        <i class="fa-solid fa-users mr-1"></i> PVP
                    </button>
                    <button id="btn-pve" class="px-3 py-1.5 rounded-md transition-all text-xs font-semibold text-slate-400 hover:text-slate-100">
                        <i class="fa-solid fa-robot mr-1"></i> VS AI
                    </button>
                </div>
            </div>

            <!-- AI Difficulty Selector (hidden by default) -->
            <div id="ai-difficulty-container" class="hidden flex justify-between items-center text-sm font-medium border-t border-slate-700/30 pt-3">
                <span class="text-slate-300">AI Level:</span>
                <div class="flex gap-1 bg-slate-900/50 p-1 rounded-lg border border-slate-700/50">
                    <button data-diff="easy" class="btn-diff px-2.5 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-slate-200">Easy</button>
                    <button data-diff="medium" class="btn-diff px-2.5 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-slate-200">Medium</button>
                    <button data-diff="impossible" class="btn-diff px-2.5 py-1 rounded-md text-xs font-semibold bg-purple-600 text-white shadow" title="Highly tactical, but with a slight 15% slip-up rate!">Almost Impossible</button>
                </div>
            </div>
        </div>

        <!-- Scores and Status -->
        <div class="grid grid-cols-3 gap-3">
            <div class="glass-panel rounded-xl p-3 text-center flex flex-col justify-center">
                <span class="text-xs text-purple-400 font-semibold uppercase tracking-wider flex items-center justify-center gap-1">
                    <i class="fa-solid fa-xmark text-sm"></i> Player X
                </span>
                <span id="score-x" class="text-2xl font-bold text-slate-100 mt-1">0</span>
            </div>
            <div class="glass-panel rounded-xl p-3 text-center flex flex-col justify-center">
                <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Draws</span>
                <span id="score-ties" class="text-2xl font-bold text-slate-100 mt-1">0</span>
            </div>
            <div class="glass-panel rounded-xl p-3 text-center flex flex-col justify-center">
                <span class="text-xs text-teal-400 font-semibold uppercase tracking-wider flex items-center justify-center gap-1">
                    <i class="fa-solid fa-circle text-[10px]"></i> Player O
                </span>
                <span id="score-o" class="text-2xl font-bold text-slate-100 mt-1">0</span>
            </div>
        </div>

        <!-- Current Status Alert -->
        <div class="glass-panel rounded-xl py-3 px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-purple-500 animate-pulse" id="status-pulse"></span>
                <p id="status-text" class="text-sm font-semibold tracking-wide text-slate-200">Player X's Turn</p>
            </div>
            <button id="btn-mute" class="text-slate-400 hover:text-slate-100 transition-colors">
                <i class="fa-solid fa-volume-high text-sm" id="mute-icon"></i>
            </button>
        </div>

        <!-- Game Board -->
        <div class="glass-panel rounded-3xl p-4 shadow-2xl relative overflow-hidden">
            <div class="grid grid-cols-3 gap-3" id="board-grid">
                <!-- 9 Grid Cells generated programmatically -->
            </div>
        </div>

        <!-- Action Controls -->
        <div class="flex gap-4">
            <button id="btn-reset" class="flex-1 glass-panel hover:bg-slate-800/80 active:scale-95 transition-all text-slate-100 py-3 rounded-xl font-bold text-sm tracking-wider uppercase flex items-center justify-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Reset Game
            </button>
            <button id="btn-clear-scores" class="glass-panel hover:bg-slate-800/80 active:scale-95 transition-all text-slate-400 hover:text-red-400 px-5 rounded-xl font-bold text-sm uppercase flex items-center justify-center" title="Reset Scores">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </div>

        <!-- Footer Info -->
        <footer class="text-center text-xs text-slate-500">
            Created with adaptive dynamic SFX & smart minimax AI logic.
        </footer>
    </div>

    <!-- Alert / Custom Notification Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-all duration-300 opacity-0">
        <div class="glass-panel max-w-sm w-full rounded-2xl p-6 text-center transform scale-95 transition-all duration-300 flex flex-col items-center">
            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4" id="modal-icon-bg">
                <i class="fa-solid fa-trophy text-2xl" id="modal-icon"></i>
            </div>
            <h3 class="text-2xl font-extrabold mb-2" id="modal-title">Victory!</h3>
            <p class="text-slate-400 mb-6 text-sm" id="modal-message">Player X dominates the arena.</p>
            <button id="modal-close" class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 hover:from-purple-600 hover:to-indigo-700 font-bold py-3 rounded-xl transition-all shadow-lg text-sm uppercase tracking-wider">
                Play Next Round
            </button>
        </div>
    </div>

    <script>
        // Wait for DOM to load fully before initializing everything
        window.onload = function() {
            // Audio System (Web Audio API)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let isMuted = false;

            function playSound(type) {
                if (isMuted) return;
                try {
                    // Resume context if suspended (browser security auto-suspension)
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }

                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    const now = audioCtx.currentTime;

                    if (type === 'x') {
                        // High-tech sci-fi rising chirp
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.exponentialRampToValueAtTime(700, now + 0.1);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc.start(now);
                        osc.stop(now + 0.1);
                    } else if (type === 'o') {
                        // Deeper, smooth resonance
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(450, now);
                        osc.frequency.exponentialRampToValueAtTime(250, now + 0.12);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                        osc.start(now);
                        osc.stop(now + 0.12);
                    } else if (type === 'win') {
                        // Glorious major chord fanfare
                        const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
                        notes.forEach((freq, idx) => {
                            const o = audioCtx.createOscillator();
                            const g = audioCtx.createGain();
                            o.connect(g);
                            g.connect(audioCtx.destination);
                            o.type = 'triangle';
                            o.frequency.setValueAtTime(freq, now + idx * 0.08);
                            g.gain.setValueAtTime(0.1, now + idx * 0.08);
                            g.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.08 + 0.4);
                            o.start(now + idx * 0.08);
                            o.stop(now + idx * 0.08 + 0.4);
                        });
                    } else if (type === 'draw') {
                        // Melancholy descending sweep
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.linearRampToValueAtTime(120, now + 0.3);
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                    } else if (type === 'click') {
                        // Subtle feedback click
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600, now);
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                        osc.start(now);
                        osc.stop(now + 0.05);
                    }
                } catch (e) {
                    console.log('Audio Context issues:', e);
                }
            }

            // Confetti System
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let isConfettiRunning = false;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class ConfettiParticle {
                constructor() {
                    this.x = canvas.width / 2;
                    this.y = canvas.height + 20;
                    this.radius = Math.random() * 5 + 4;
                    this.color = `hsl(${Math.random() * 360}, 90%, 65%)`;
                    this.vx = (Math.random() - 0.5) * 15;
                    this.vy = -Math.random() * 18 - 8;
                    this.gravity = 0.35;
                    this.alpha = 1;
                    this.rotation = Math.random() * 360;
                    this.spin = (Math.random() - 0.5) * 8;
                }
                update() {
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.spin;
                    if (this.y > canvas.height + 20) {
                        this.alpha = 0;
                    } else if (this.vy > 0) {
                        this.alpha -= 0.015;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate((this.rotation * Math.PI) / 180);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = Math.max(0, this.alpha);
                    ctx.fillRect(-this.radius, -this.radius, this.radius * 2, this.radius * 2);
                    ctx.restore();
                }
            }

            function triggerConfetti() {
                isConfettiRunning = true;
                particles = [];
                for (let i = 0; i < 120; i++) {
                    particles.push(new ConfettiParticle());
                }
                animateConfetti();
            }

            function animateConfetti() {
                if (!isConfettiRunning) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, idx) => {
                    p.update();
                    p.draw();
                    if (p.alpha <= 0) particles.splice(idx, 1);
                });

                if (particles.length > 0) {
                    requestAnimationFrame(animateConfetti);
                } else {
                    isConfettiRunning = false;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            // Game Logic Variables
            let board = ["", "", "", "", "", "", "", "", ""];
            let currentPlayer = "X"; // X always starts
            let gameMode = "PVP"; // "PVP" or "PVE"
            let difficulty = "impossible"; // "easy", "medium", "impossible"
            let scores = { x: 0, ties: 0, o: 0 };
            let isGameOver = false;

            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];

            // DOM elements
            const gridContainer = document.getElementById('board-grid');
            const statusText = document.getElementById('status-text');
            const statusPulse = document.getElementById('status-pulse');
            const btnPvp = document.getElementById('btn-pvp');
            const btnPve = document.getElementById('btn-pve');
            const aiDifficultyContainer = document.getElementById('ai-difficulty-container');
            const scoreXDisplay = document.getElementById('score-x');
            const scoreODisplay = document.getElementById('score-o');
            const scoreTiesDisplay = document.getElementById('score-ties');
            const btnMute = document.getElementById('btn-mute');
            const muteIcon = document.getElementById('mute-icon');
            const btnReset = document.getElementById('btn-reset');
            const btnClearScores = document.getElementById('btn-clear-scores');
            
            // Modal Elements
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const modalIcon = document.getElementById('modal-icon');
            const modalIconBg = document.getElementById('modal-icon-bg');
            const modalClose = document.getElementById('modal-close');

            // Generate Board dynamically to ensure perfectly responsive aspect ratios
            function createBoard() {
                gridContainer.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('button');
                    cell.setAttribute('data-index', i);
                    cell.className = "grid-cell bg-slate-900/40 hover:bg-slate-800/60 border border-slate-700/50 rounded-2xl flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all text-5xl font-extrabold relative overflow-hidden";
                    cell.addEventListener('click', () => handleCellClick(i));
                    gridContainer.appendChild(cell);
                }
            }

            // Handle Click Events
            function handleCellClick(index) {
                if (board[index] !== "" || isGameOver) return;
                
                // Block human interaction if it's the AI's turn
                if (gameMode === "PVE" && currentPlayer === "O") return;

                makeMove(index);

                if (!isGameOver && gameMode === "PVE" && currentPlayer === "O") {
                    setTimeout(makeAiMove, 550); // Fluid artificial thought delay
                }
            }

            // Execute game moves
            function makeMove(index) {
                board[index] = currentPlayer;
                const cell = gridContainer.children[index];
                
                // Play responsive sound based on token
                playSound(currentPlayer === 'X' ? 'x' : 'o');

                // Render dynamic animated marker
                if (currentPlayer === "X") {
                    cell.innerHTML = `
                        <svg class="w-1/2 h-1/2 glow-x scale-0 transition-transform duration-300 ease-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    `;
                    cell.classList.add('cell-x-active');
                    // Trigger entry scale animation
                    setTimeout(() => cell.querySelector('svg').classList.remove('scale-0'), 10);
                } else {
                    cell.innerHTML = `
                        <svg class="w-1/2 h-1/2 glow-o scale-0 transition-transform duration-300 ease-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                    `;
                    cell.classList.add('cell-o-active');
                    // Trigger entry scale animation
                    setTimeout(() => cell.querySelector('svg').classList.remove('scale-0'), 10);
                }

                // Check winner/draw state
                checkGameState();
            }

            function checkGameState() {
                let roundWon = false;
                let winningPattern = [];

                for (let i = 0; i < winPatterns.length; i++) {
                    const [a, b, c] = winPatterns[i];
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        roundWon = true;
                        winningPattern = [a, b, c];
                        break;
                    }
                }

                if (roundWon) {
                    highlightWinner(winningPattern);
                    scores[currentPlayer.toLowerCase()]++;
                    updateScoreboard();
                    isGameOver = true;
                    
                    playSound('win');
                    triggerConfetti();

                    setTimeout(() => {
                        showModal(
                            'Victory!', 
                            gameMode === "PVE" && currentPlayer === "O" ? 'The AI algorithm analyzed and outplayed you.' : `Player ${currentPlayer} masterfully won the matches!`, 
                            currentPlayer === 'X' ? 'bg-purple-500/20 text-purple-400' : 'bg-teal-500/20 text-teal-400', 
                            currentPlayer === 'X' ? 'fa-solid fa-trophy' : 'fa-solid fa-award'
                        );
                    }, 600);
                    return;
                }

                if (!board.includes("")) {
                    scores.ties++;
                    updateScoreboard();
                    isGameOver = true;
                    playSound('draw');
                    
                    setTimeout(() => {
                        showModal(
                            'Splendid Tie!', 
                            'A perfect game of strategy where minds matched perfectly.', 
                            'bg-slate-700/30 text-slate-400', 
                            'fa-solid fa-handshake'
                        );
                    }, 600);
                    return;
                }

                // Flip Player Turn
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                updateStatus();
            }

            function highlightWinner(pattern) {
                pattern.forEach(index => {
                    const cell = gridContainer.children[index];
                    cell.classList.remove('bg-slate-900/40', 'hover:bg-slate-800/60');
                    if (currentPlayer === "X") {
                        cell.style.backgroundColor = 'rgba(168, 85, 247, 0.25)';
                        cell.style.borderColor = '#a855f7';
                    } else {
                        cell.style.backgroundColor = 'rgba(45, 212, 191, 0.25)';
                        cell.style.borderColor = '#2dd4bf';
                    }
                });
            }

            function updateStatus() {
                if (gameMode === "PVP") {
                    statusText.innerText = `Player ${currentPlayer}'s Turn`;
                    statusPulse.className = `h-2 w-2 rounded-full animate-pulse ${currentPlayer === 'X' ? 'bg-purple-500' : 'bg-teal-400'}`;
                } else {
                    if (currentPlayer === "X") {
                        statusText.innerText = `Your Turn (X)`;
                        statusPulse.className = "h-2 w-2 rounded-full animate-pulse bg-purple-500";
                    } else {
                        statusText.innerText = `AI Thinking...`;
                        statusPulse.className = "h-2 w-2 rounded-full animate-ping bg-teal-400";
                    }
                }
            }

            function updateScoreboard() {
                scoreXDisplay.innerText = scores.x;
                scoreODisplay.innerText = scores.o;
                scoreTiesDisplay.innerText = scores.ties;
            }

            // AI Logic using classic Minimax and varying heuristic ranges
            function makeAiMove() {
                if (isGameOver) return;

                let selectedMove;

                if (difficulty === "easy") {
                    // Random strategy
                    selectedMove = getRandomMove();
                } else if (difficulty === "medium") {
                    // 65% chance of making the smartest choice, else random
                    if (Math.random() < 0.65) {
                        selectedMove = getBestMove();
                    } else {
                        selectedMove = getRandomMove();
                    }
                } else {
                    // "Almost Impossible" - 85% chance of perfect move, 15% chance of making a random move.
                    // This keeps it highly smart and challenging, but beatable with strategic play!
                    if (Math.random() < 0.85) {
                        selectedMove = getBestMove();
                    } else {
                        selectedMove = getRandomMove();
                    }
                }

                if (selectedMove !== undefined) {
                    makeMove(selectedMove);
                }
            }

            function getRandomMove() {
                const emptyIndices = board.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
                if (emptyIndices.length > 0) {
                    return emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                }
                return undefined;
            }

            function getBestMove() {
                let bestScore = -Infinity;
                let move;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "O";
                        let score = minimax(board, 0, false);
                        board[i] = "";
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                }
                return move;
            }

            // Minimax core loop for uncompromised logical outcomes
            function minimax(tempBoard, depth, isMaximizing) {
                const scoresMap = { O: 10, X: -10, tie: 0 };
                const result = checkBoardWinner(tempBoard);
                if (result !== null) {
                    return scoresMap[result] - (isMaximizing ? depth : -depth); // account for depth for faster wins/slower losses
                }

                if (isMaximizing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === "") {
                            tempBoard[i] = "O";
                            let score = minimax(tempBoard, depth + 1, false);
                            tempBoard[i] = "";
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === "") {
                            tempBoard[i] = "X";
                            let score = minimax(tempBoard, depth + 1, true);
                            tempBoard[i] = "";
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }

            function checkBoardWinner(b) {
                for (let i = 0; i < winPatterns.length; i++) {
                    const [x, y, z] = winPatterns[i];
                    if (b[x] && b[x] === b[y] && b[x] === b[z]) {
                        return b[x];
                    }
                }
                if (!b.includes("")) return 'tie';
                return null;
            }

            // Custom Notification Overlay Modals
            function showModal(title, msg, iconBgClass, iconClass) {
                modalTitle.innerText = title;
                modalMessage.innerText = msg;
                modalIconBg.className = `w-16 h-16 rounded-full flex items-center justify-center mb-4 ${iconBgClass}`;
                modalIcon.className = `${iconClass} text-2xl`;

                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.firstElementChild.classList.remove('scale-95');
                }, 50);
            }

            function closeModal() {
                playSound('click');
                modal.classList.add('opacity-0');
                modal.firstElementChild.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    resetBoardOnly();
                }, 300);
            }

            // Clear board only (maintains match scores)
            function resetBoardOnly() {
                board = ["", "", "", "", "", "", "", "", ""];
                currentPlayer = "X"; // reset to human first turn
                isGameOver = false;
                createBoard();
                updateStatus();
            }

            // Button Event Listeners
            btnReset.addEventListener('click', () => {
                playSound('click');
                resetBoardOnly();
            });

            btnClearScores.addEventListener('click', () => {
                playSound('click');
                scores = { x: 0, ties: 0, o: 0 };
                updateScoreboard();
                resetBoardOnly();
            });

            // Handle Mode Selection Shifts
            btnPvp.addEventListener('click', () => {
                playSound('click');
                gameMode = "PVP";
                btnPvp.className = "px-3 py-1.5 rounded-md transition-all text-xs font-semibold bg-purple-600 text-white shadow";
                btnPve.className = "px-3 py-1.5 rounded-md transition-all text-xs font-semibold text-slate-400 hover:text-slate-100";
                aiDifficultyContainer.classList.add('hidden');
                resetBoardOnly();
            });

            btnPve.addEventListener('click', () => {
                playSound('click');
                gameMode = "PVE";
                btnPve.className = "px-3 py-1.5 rounded-md transition-all text-xs font-semibold bg-purple-600 text-white shadow";
                btnPvp.className = "px-3 py-1.5 rounded-md transition-all text-xs font-semibold text-slate-400 hover:text-slate-100";
                aiDifficultyContainer.classList.remove('hidden');
                resetBoardOnly();
            });

            // Handle Difficulty Selection Buttons
            document.querySelectorAll('.btn-diff').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    playSound('click');
                    document.querySelectorAll('.btn-diff').forEach(b => {
                        b.className = "btn-diff px-2.5 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-slate-200";
                    });
                    e.target.className = "btn-diff px-2.5 py-1 rounded-md text-xs font-semibold bg-purple-600 text-white shadow";
                    difficulty = e.target.getAttribute('data-diff');
                    resetBoardOnly();
                });
            });

            // Audio Mute Trigger
            btnMute.addEventListener('click', () => {
                isMuted = !isMuted;
                if (isMuted) {
                    muteIcon.className = "fa-solid fa-volume-xmark text-slate-500 text-sm";
                } else {
                    muteIcon.className = "fa-solid fa-volume-high text-slate-400 text-sm";
                }
            });

            modalClose.addEventListener('click', closeModal);

            // Init call to start board creation
            createBoard();
            updateStatus();
        };
    </script>
</body>
</html>
